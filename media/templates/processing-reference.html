<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="Content-Security-Policy" content="default-src 'none'; frame-src {{cspSource}} https://processing.org; style-src 'unsafe-inline'; script-src 'nonce-{{nonce}}';">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<style>
		html, body {
			height: 100%;
			margin: 0;
			overflow: hidden;
			background: var(--vscode-editor-background);
		}
		iframe {
			display: block;
			width: 100%;
			height: 100%;
			border: 0;
			background: white;
		}
	</style>
</head>
<body>
	<iframe id="reference"></iframe>
	<script nonce="{{nonce}}">
		const payload = JSON.parse("{{payload}}");
		const frame = document.getElementById('reference');
		frame.title = payload.title;

		if (payload.kind === 'pdf') {
			const viewerUrl = new URL(payload.pdfViewerPageUri);
			viewerUrl.searchParams.set('file', payload.url);
			frame.src = viewerUrl.toString();
		} else {
			frame.src = payload.url;
		}
	</script>
</body>
</html>
