<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<style>
		html, body {
			height: 100%;
			margin: 0;
			background: var(--vscode-editor-background);
			color: var(--vscode-editor-foreground);
			font-family: var(--vscode-font-family);
			font-size: var(--vscode-font-size);
		}
		body {
			box-sizing: border-box;
			padding: 18px 22px 44px;
		}
		main {
			max-width: 780px;
		}
		h1 {
			margin: 0 0 8px;
			font-size: 22px;
			font-weight: 600;
		}
		.meta, .message {
			color: var(--vscode-descriptionForeground);
			font-size: 12px;
			line-height: 1.45;
		}
		.description {
			margin: 20px 0;
			line-height: 1.55;
			white-space: pre-wrap;
		}
		.actions {
			display: flex;
			gap: 8px;
			margin: 16px 0 20px;
		}
		button {
			min-height: 28px;
			border: 1px solid var(--vscode-button-border, transparent);
			border-radius: 4px;
			padding: 4px 12px;
			background: var(--vscode-button-background);
			color: var(--vscode-button-foreground);
			font: inherit;
			cursor: pointer;
		}
		button:hover:not(:disabled) {
			background: var(--vscode-button-hoverBackground);
		}
		button.secondary {
			border-color: var(--vscode-button-secondaryBorder, var(--vscode-button-border, transparent));
			background: var(--vscode-button-secondaryBackground);
			color: var(--vscode-button-secondaryForeground);
		}
		button.secondary:hover:not(:disabled) {
			background: var(--vscode-button-secondaryHoverBackground);
		}
		button:disabled {
			opacity: .45;
			cursor: default;
		}
		.results {
			display: grid;
			gap: 8px;
			margin-top: 12px;
		}
		.bottom-spacer {
			height: 40px;
		}
		.result {
			border: 1px solid var(--vscode-panel-border);
			background: var(--vscode-editor-background);
			padding: 10px 12px;
		}
		.result-title {
			display: block;
			margin-bottom: 6px;
		}
		.result-status {
			text-align: left;
			font-size: 11px;
			font-weight: 600;
			text-transform: uppercase;
		}
		.result-time {
			color: var(--vscode-descriptionForeground);
			font-weight: 400;
			text-transform: none;
		}
		.result-description {
			margin-bottom: 8px;
			color: var(--vscode-descriptionForeground);
			white-space: pre-wrap;
		}
		.passed {
			color: var(--vscode-testing-iconPassed);
		}
		.failed {
			color: var(--vscode-testing-iconFailed);
		}
		.reason {
			margin-top: 8px;
			white-space: pre-wrap;
			color: var(--vscode-descriptionForeground);
		}
		.spinner {
			display: inline-block;
			width: 12px;
			height: 12px;
			margin-right: 6px;
			border: 2px solid var(--vscode-button-foreground);
			border-top-color: transparent;
			border-radius: 50%;
			vertical-align: -2px;
			animation: spin .8s linear infinite;
		}
		@keyframes spin {
			to { transform: rotate(360deg); }
		}
	</style>
</head>
<body>
	<main>
		<h1 id="name"></h1>
		<div id="meta" class="meta"></div>
		<div id="description" class="description"></div>
		<div class="actions">
			<button id="start" type="button">Start Assignment</button>
			<button id="evaluate" type="button">Begin Evaluation</button>
			<button id="restart" class="secondary" type="button">Restart Assignment</button>
		</div>
		<div id="message" class="message"></div>
		<section>
			<h2>Evaluations</h2>
			<div id="results" class="results"></div>
		</section>
		<div class="bottom-spacer" aria-hidden="true"></div>
	</main>
	<script nonce="{{nonce}}">
		const vscode = acquireVsCodeApi();
		let state = JSON.parse("{{initialState}}");
		const name = document.getElementById('name');
		const meta = document.getElementById('meta');
		const description = document.getElementById('description');
		const start = document.getElementById('start');
		const restart = document.getElementById('restart');
		const evaluate = document.getElementById('evaluate');
		const message = document.getElementById('message');
		const results = document.getElementById('results');

		function formatTimestamp(value) {
			const date = new Date(value);
			if (Number.isNaN(date.getTime())) {
				return '';
			}
			const pad = number => String(number).padStart(2, '0');
			return [
				pad(date.getMonth() + 1),
				pad(date.getDate()),
				date.getFullYear()
			].join('/') + ' ' + [
				pad(date.getHours()),
				pad(date.getMinutes()),
				pad(date.getSeconds())
			].join(':');
		}

		function applyState(next) {
			state = next;
			name.textContent = state.displayName;
			meta.textContent = 'ID: ' + state.id;
			description.textContent = state.description;
			start.hidden = state.started && !state.preview;
			start.textContent = state.preview ? 'Download Assignment' : 'Start Assignment';
			restart.hidden = !state.started || state.preview;
			evaluate.hidden = !state.started || state.preview;
			start.disabled = state.running || !state.hasWorkspace;
			restart.disabled = state.running;
			evaluate.disabled = state.running;
			evaluate.innerHTML = state.running ? '<span class="spinner"></span>Running Evaluation' : 'Begin Evaluation';
			message.textContent = state.message || '';
			results.textContent = '';
			for (const result of state.results || []) {
				const item = document.createElement('div');
				item.className = 'result';
				const title = document.createElement('strong');
				title.className = 'result-title';
				title.textContent = result.displayName || result.id;
				item.append(title);
				if (result.description) {
					const description = document.createElement('div');
					description.className = 'result-description';
					description.textContent = result.description;
					item.append(description);
				}
				if (typeof result.passed === 'boolean') {
					const status = document.createElement('span');
					status.className = 'result-status';
					const statusText = document.createElement('span');
					statusText.className = result.passed ? 'passed' : 'failed';
					statusText.textContent = result.passed ? 'PASSED' : 'FAILED';
					status.append(statusText);
					const timestamp = formatTimestamp(result.evaluatedAt);
					if (timestamp) {
						const time = document.createElement('span');
						time.className = 'result-time';
						time.textContent = ' on ' + timestamp;
						status.append(time);
					}
					item.append(status);
				}
				if (result.reason) {
					const reason = document.createElement('div');
					reason.className = 'reason';
					reason.textContent = result.reason;
					item.append(reason);
				}
				results.append(item);
			}
		}

		start.addEventListener('click', () => vscode.postMessage({ type: 'start' }));
		restart.addEventListener('click', () => vscode.postMessage({ type: 'restart' }));
		evaluate.addEventListener('click', () => vscode.postMessage({ type: 'evaluate' }));
		window.addEventListener('message', event => {
			if (event.data?.type === 'state') {
				applyState(event.data.state);
			}
		});
		applyState(state);
	</script>
</body>
</html>
